<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Page</title>
</head>
<body>
        <form action="registration">
            <h1>Student Registration Page</h1>
            <label for="name">Student Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter Your Name"><br><br>
            <label for="cgpa">Student CGPA:</label>
            <input type="number" id="cgpa" name="cgpa" required placeholder="Enter Your CGPA"><br><br>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="male" required><br><br>
            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" value="female" required><br><br>
            <label for="Dept">Select Department:</label>
            <select id="Dept" name="dept" required>
                <option value="CSE">CSE</option>
                <option value="ECE">EEE</option>
                <option value="ME">ME</option>
            </select><br><br>
            <label for="St_id">Student ID:</label>
            <input type="text" id="St_id" name="St_id" required><br><br>
            <label for="address">Address:</label>
            <textarea id="address" placeholder="Enter your address here"></textarea><br><br>
            <label for="dob">Date of birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email"><br><br>
            <label for="file">Upload your grade report:</label>
            <input type="file" id="file" name="file" required><br><br>
            <label for="terms">I agree to the terms and conditions:</label>
            <input type="checkbox" id="terms" name="terms" required><br><br>
            <label for="Phone">Phone Number</label>
            <input type="tel" id="Phone" name="Phone" required placeholder="Enter your phone number"><br><br>
            <label for="submit">Submit your information</label><br>
            <input type="submit" id="submit" value="Submit">
            
        </form>
 
</body>
</html>
